[mypy]
python_version = 3.11
warn_unused_configs = True
warn_redundant_casts = True
show_error_codes = True
check_untyped_defs = True
install_types = True
non_interactive = True
explicit_package_bases = True
namespace_packages = True

# Use installed packages from the virtual environment
no_site_packages = False

files = diagrid/**/*.py

[mypy-google]
ignore_missing_imports = True
follow_imports = skip

[mypy-google.*]
ignore_missing_imports = True
follow_imports = skip

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-diagrid.agent.langgraph.examples.*]
ignore_errors = True

[mypy-diagrid.agent.crewai.examples.*]
ignore_errors = True

[mypy-diagrid.agent.adk.examples.*]
ignore_errors = True

[mypy-diagrid.agent.strands.examples.*]
ignore_errors = True

[mypy-diagrid.agent.openai_agents.examples.*]
ignore_errors = True

[mypy-agents.*]
ignore_missing_imports = True

[mypy-strands]
ignore_missing_imports = True

[mypy-strands.*]
ignore_missing_imports = True

[mypy-langgraph]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

