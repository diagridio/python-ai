name: Claude CI Fix

on:
  workflow_run:
    workflows: ["Lint and Build"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

concurrency:
  group: claude-ci-fix-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] != null &&
      github.event.workflow_run.actor.login != 'claude[bot]' &&
      github.event.workflow_run.actor.login != 'diagrid-bot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.workflow_run.pull_requests[0].number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            // Count existing fix attempt labels
            const attemptLabels = pr.labels
              .map(l => l.name)
              .filter(n => n.startsWith('claude-fix-attempt-'));
            const attemptCount = attemptLabels.length;

            core.setOutput('number', prNumber);
            core.setOutput('ref', pr.head.ref);
            core.setOutput('attempt_count', attemptCount);

      - name: Check attempt limit
        if: steps.pr.outputs.attempt_count >= 2
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: '🛑 **Claude CI Fix**: Reached maximum fix attempts (2). This failure likely requires human intervention.\n\nPlease review the CI logs and fix manually.',
            });
            core.setFailed('Max fix attempts reached');

      - name: Download failure logs
        if: steps.pr.outputs.attempt_count < 2
        id: logs
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            // Get jobs for the failed workflow run
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            let allLogs = '';
            for (const job of jobs.jobs) {
              if (job.conclusion === 'failure') {
                try {
                  const logData = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: job.id,
                  });
                  allLogs += `\n=== Job: ${job.name} ===\n${logData.data}\n`;
                } catch (e) {
                  allLogs += `\n=== Job: ${job.name} === (logs unavailable: ${e.message})\n`;
                }
              }
            }

            // Write logs to file (may be too large for output)
            fs.writeFileSync('/tmp/ci-failure-logs.txt', allLogs);
            core.setOutput('path', '/tmp/ci-failure-logs.txt');

      - name: Add attempt label
        if: steps.pr.outputs.attempt_count < 2
        uses: actions/github-script@v8
        with:
          script: |
            const attempt = parseInt('${{ steps.pr.outputs.attempt_count }}') + 1;
            const label = `claude-fix-attempt-${attempt}`;

            // Create label if it doesn't exist
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: 'e11d48',
                description: `Claude CI fix attempt ${attempt}`,
              });
            } catch (e) {
              // Label already exists, ignore
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              labels: [label],
            });

      - name: Generate App token
        if: steps.pr.outputs.attempt_count < 2
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DIAGRID_BOT_APPLICATION_ID }}
          private-key: ${{ secrets.DIAGRID_BOT_APPLICATION_PRIVATE_KEY }}

      - name: Checkout PR branch
        if: steps.pr.outputs.attempt_count < 2
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.ref }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Run Claude CI Fix
        if: steps.pr.outputs.attempt_count < 2
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          max_turns: 15
          use_sticky_comment: true
          pr_number: ${{ steps.pr.outputs.number }}
          prompt: |
            You are the CI Fix Agent. Your ONLY job is to fix the CI failures shown in the logs below.

            ## CI Failure Logs
            The failure logs are at: /tmp/ci-failure-logs.txt
            Read them first to understand what failed.

            ## Quality Commands (run in this order)
            1. `uv sync --all-packages --extra all --group test` — install deps
            2. `uv run ruff format` — fix formatting
            3. `uv run flake8 diagrid tests --ignore=E501,F401,W503,E203,E704` — check lint
            4. `uv run mypy --config-file mypy.ini` — check types
            5. `uv run pytest tests -m "not integration"` — run tests

            ## Rules
            - Fix ONLY the issues causing CI failures. Do not refactor or improve unrelated code.
            - Do NOT modify: pyproject.toml, uv.lock, mypy.ini, charts/, .github/workflows/
            - Do NOT add new dependencies.
            - Do NOT delete or skip tests.
            - After fixing, run the quality commands to verify your fixes work.
            - Commit your fixes with a message like: "fix: resolve CI failures (ruff/flake8/mypy/pytest)"
            - Push the commit to the PR branch.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Bash(uv sync*)",
                  "Bash(uv run ruff format*)",
                  "Bash(uv run flake8*)",
                  "Bash(uv run mypy*)",
                  "Bash(uv run pytest*)",
                  "Bash(git add*)",
                  "Bash(git commit*)",
                  "Bash(git push*)",
                  "Bash(git diff*)",
                  "Bash(git log*)",
                  "Bash(git status*)",
                  "Read",
                  "Edit",
                  "Glob",
                  "Grep"
                ],
                "deny": []
              }
            }
