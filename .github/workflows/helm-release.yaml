name: Helm Release

on:
  workflow_run:
    workflows: ["Helm CI", "Release Python Packages"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  HELM_VERSION: "3.17.0"
  REGISTRY: ghcr.io

jobs:
  detect-version:
    name: Detect Version Bump
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for version bump
        id: check
        run: |
          CHART_VERSION=$(grep '^version:' charts/catalyst-agents/Chart.yaml | awk '{print $2}')
          echo "Chart.yaml version: $CHART_VERSION"

          # Get latest helm-chart tag, default to 0.0.0 if none exist
          LATEST_TAG=$(git tag --sort=-v:refname --list 'helm-chart/v*' | head -1 || echo "")
          if [ -z "$LATEST_TAG" ]; then
            LATEST_VERSION="0.0.0"
          else
            LATEST_VERSION="${LATEST_TAG#helm-chart/v}"
          fi
          echo "Latest released version: $LATEST_VERSION"

          if [ "$CHART_VERSION" = "$LATEST_VERSION" ]; then
            echo "No version bump detected"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif [ "$(printf '%s\n%s' "$LATEST_VERSION" "$CHART_VERSION" | sort -V | tail -1)" = "$CHART_VERSION" ]; then
            echo "Version bump detected: $LATEST_VERSION -> $CHART_VERSION"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Chart version ($CHART_VERSION) is not newer than latest tag ($LATEST_VERSION)"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Helm dependency update
        run: helm dependency update ./charts/catalyst-agents

      - name: Package chart
        run: helm package ./charts/catalyst-agents

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push chart to OCI registry
        run: |
          helm push catalyst-agents-${{ needs.detect-version.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GHCR (ORAS)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push ArtifactHub repo metadata
        run: |
          oras push \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/catalyst-agents:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "helm-chart/v${{ needs.detect-version.outputs.version }}" \
            -m "Helm chart release v${{ needs.detect-version.outputs.version }}"
          git push origin "helm-chart/v${{ needs.detect-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helm-chart/v${{ needs.detect-version.outputs.version }}
          name: "Helm Chart v${{ needs.detect-version.outputs.version }}"
          generate_release_notes: true
          files: catalyst-agents-${{ needs.detect-version.outputs.version }}.tgz
