name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  actions: read
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.pull_request.user.login != 'diagrid-bot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DIAGRID_BOT_APPLICATION_ID }}
          private-key: ${{ secrets.DIAGRID_BOT_APPLICATION_PRIVATE_KEY }}

      - name: Skip if latest commit is from a bot
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const latest = commits[commits.length - 1];
            const author = latest.author?.login || latest.commit.author?.name || '';
            const bots = ['claude[bot]', 'diagrid-bot[bot]'];
            if (bots.includes(author)) {
              core.setOutput('skip', 'true');
              core.info('Skipping review — latest commit is from a bot');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Clean up fix attempt labels
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            for (const label of labels) {
              if (label.name.startsWith('claude-fix-attempt-')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: label.name,
                });
              }
            }

      - name: Checkout PR branch
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Run Claude PR Review
        if: steps.check.outputs.skip != 'true'
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          use_sticky_comment: true
          track_progress: true
          claude_args: "--max-turns 8"
          prompt: |
            You are the Review Agent. Review the PR changes and provide structured feedback.

            ## Instructions
            1. Run `git diff origin/main...HEAD` to see all changes in this PR.
            2. Run `git log origin/main...HEAD --oneline` to see the commit history.
            3. Analyze the changes for: correctness, type safety, test coverage, security, and consistency with existing patterns.
            4. Categorize each suggestion as either **architectural** or **non_architectural**.

            ### Architectural suggestions (require human decision):
            - New design patterns or abstractions
            - Changes to public APIs in diagrid/core/
            - New dependencies or significant restructuring
            - Changes that affect multiple packages

            ### Non-architectural suggestions (can be auto-implemented):
            - Missing type annotations on new/changed functions
            - Inconsistent naming (not matching existing conventions)
            - Missing error handling on external calls
            - Test coverage gaps for new code paths
            - Minor code quality issues (unused variables, redundant logic)

            ## Output Format
            Structure your review comment as follows:

            ### 🏗️ Architectural (Human Decision Needed)
            List architectural suggestions here, or "None" if there are no architectural concerns.

            ### 🔧 Non-Architectural (Auto-Implementable)
            List non-architectural suggestions here as a numbered list. Be specific about file paths and what to change. Or "None" if the code looks good.

            ### ✅ Summary
            Brief overall assessment of the PR quality.

            ## Rules
            - Be constructive and specific. Reference file paths and line numbers.
            - Do NOT suggest changes to: pyproject.toml, uv.lock, mypy.ini, charts/, .github/workflows/
            - Do NOT suggest adding new dependencies.
            - Focus on the diff — don't review unchanged code.
          settings: |
            {
              "permissions": {
                "deny": [
                  "Edit",
                  "MultiEdit",
                  "Write",
                  "NotebookEdit",
                  "Bash(git add*)",
                  "Bash(git commit*)",
                  "Bash(git push*)",
                  "Bash(git rm*)"
                ]
              }
            }

      - name: Dispatch implementation if needed
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            // Find the latest review comment (posted by the action via use_sticky_comment)
            const claudeComments = comments.filter(c =>
              c.body?.includes('Non-Architectural')
            );

            if (claudeComments.length === 0) {
              core.info('No review comment found, skipping dispatch');
              return;
            }

            const latestReview = claudeComments[claudeComments.length - 1];
            const body = latestReview.body;

            // Extract the non-architectural section
            const nonArchMatch = body.match(/### 🔧 Non-Architectural.*?\n([\s\S]*?)(?=### ✅|$)/);
            if (!nonArchMatch) {
              core.info('Could not parse non-architectural section');
              return;
            }

            const nonArchSection = nonArchMatch[1].trim();

            // Skip if "None" or empty
            if (nonArchSection.toLowerCase() === 'none' || nonArchSection.length === 0) {
              core.info('No non-architectural suggestions to implement');
              return;
            }

            // Dispatch implementation event
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'claude-implement',
              client_payload: {
                pr_number: prNumber,
                suggestions: nonArchSection,
              },
            });

            core.info(`Dispatched claude-implement for PR #${prNumber}`);
