# ==============================================================================
# CATALYST AGENTS STACK - CONSOLIDATED CONFIGURATION
# ==============================================================================
registry: localhost:5001

global:
  logLevel: DEBUG

# ------------------------------------------------------------------------------
# 1. MONITORING STACK
# ------------------------------------------------------------------------------
monitoring:
  enabled: true

loki:
  enabled: true
  deploymentMode: SingleBinary
  loki:
    useTestSchema: true
    auth_enabled: false
    commonConfig: { replication_factor: 1 }
    storage:
      type: filesystem
      bucketNames: { chunks: chunks, ruler: ruler, admin: admin }
  singleBinary: { replicas: 1 }
  read: { replicas: 0 }
  write: { replicas: 0 }
  backend: { replicas: 0 }

tempo:
  enabled: true

kube-prometheus-stack:
  enabled: true
  prometheus:
    prometheusSpec:
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
  grafana:
    enabled: true
    adminUser: admin
    adminPassword: admin
    grafana.ini:
      server:
        domain: grafana.localhost
        root_url: "%(protocol)s://%(domain)s:8080/"
        serve_from_sub_path: false
      auth.anonymous:
        enabled: true
        org_name: Main Org.
        org_role: Admin
    additionalDataSources:
    - name: Loki
      type: loki
      url: "http://catalyst-agents-loki-gateway.catalyst-agents.svc.cluster.local"
      access: proxy
    - name: Tempo
      type: tempo
      url: "http://catalyst-agents-tempo.catalyst-agents.svc.cluster.local:3100"
      access: proxy

opentelemetry-collector:
  enabled: true
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.142.0"
  service:
    type: NodePort
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 512
    exporters:
      otlp/tempo:
        endpoint: "catalyst-agents-tempo.catalyst-agents.svc.cluster.local:4317"
        tls: { insecure: true }
      otlphttp/loki:
        endpoint: "http://catalyst-agents-loki-gateway.catalyst-agents.svc.cluster.local/otlp"
        tls: { insecure: true }
      debug:
        verbosity: basic
    service:
      telemetry:
        metrics:
          address: null # Explicitly nullify the old address key from chart defaults
          level: normal
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki, debug]
  ports:
    otlp: { enabled: true, containerPort: 4317, servicePort: 4317, hostPort: 4317, protocol: TCP, nodePort: 30317 }
    otlp-http: { enabled: true, containerPort: 4318, servicePort: 4318, hostPort: 4318, protocol: TCP, nodePort: 30318 }
    metrics: { enabled: true, containerPort: 8888, servicePort: 8888, protocol: TCP }

# ------------------------------------------------------------------------------
# 3. CHAOS ENGINEERING
# ------------------------------------------------------------------------------
chaos:
  enabled: true
  chartVersion: "2.7.3"  # must match Chart.yaml chaos-mesh dependency version

chaos-mesh:
  controllerManager:
    replicaCount: 1
  dashboard:
    create: false

# ------------------------------------------------------------------------------
# 4. CATALYST OPERATOR
# ------------------------------------------------------------------------------
# catalystOperator:
#   enabled: false
#   catalyst:
#     apiKey: ""
#     apiEndpoint: ""
#   dapr:
#     webhook:
#       enabled: true

# ------------------------------------------------------------------------------
# 5. DEVELOPER AGENTS & TOOLS
# ------------------------------------------------------------------------------
agents: {}

llm:
  provider: ollama # 'ollama' or 'openAI'
  ollama:
    enabled: true
    model: llama3.2:latest
    endpoint: http://host.docker.internal:11434/v1
  openAI:
    model: gpt-4o-mini
  apiKey: "dummy-key"
  googleApiKey: ""

# ------------------------------------------------------------------------------
# 7. GATEWAY
# ------------------------------------------------------------------------------
gateway:
  enabled: true
