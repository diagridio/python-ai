{{- if .Values.chaos.enabled }}
---
apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: true
metadata:
  name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "catalyst-agents.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "catalyst-agents.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - "apiextensions.k8s.io"
    resources:
      - "customresourcedefinitions"
    verbs:
      - create
      - patch
      - update
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "catalyst-agents.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
roleRef:
  kind: ClusterRole
  name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "catalyst-agents.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "catalyst-agents.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "catalyst-agents.fullname" . }}-chaos-mesh-crds
      containers:
        - name: apply-crds
          image: alpine/k8s:1.32.3
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              helm repo add chaos-mesh https://charts.chaos-mesh.org --force-update
              helm pull chaos-mesh/chaos-mesh --version {{ .Values.chaos.chartVersion | quote }} --untar --untardir /tmp
              kubectl apply --server-side --force-conflicts -f /tmp/chaos-mesh/crds/
      restartPolicy: OnFailure
{{- end }}
