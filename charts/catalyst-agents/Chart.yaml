apiVersion: v2
name: catalyst-agents
description: A Helm chart for Catalyst Agents developer inner-loop
type: application
version: 0.1.16
appVersion: "0.1.0"
icon: https://cdn.prod.website-files.com/66965adecd57031ed9ad181e/6840d4036c65c72bca49e87a_logo-catalyst.svg
dependencies:
  - name: loki
    version: 6.6.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.enabled

  - name: tempo
    version: 1.10.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.enabled

  - name: kube-prometheus-stack
    version: 82.10.1
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.enabled

  - name: opentelemetry-collector
    version: 0.146.1
    repository: https://open-telemetry.github.io/opentelemetry-helm-charts
    condition: monitoring.enabled

  - name: dapr
    version: 1.17.0-rc.3
    repository: https://dapr.github.io/helm-charts/
    condition: dapr.enabled
