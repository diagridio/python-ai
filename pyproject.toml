[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "diagrid"
version = "0.1.4"
description = "Diagrid namespace package"
requires-python = ">=3.11"
dependencies = [
    "dapr>=1.16.0",
    "dapr-ext-workflow>=1.16.0",
]

[project.optional-dependencies]
langgraph = [
    "langgraph>=1.0.0",
    "langchain-core>=0.3.0",
]
crewai = [
    "crewai>=0.80.0",
    "litellm>=1.0.0",
]
adk = [
    "google-adk>=1.0.0",
]
strands = [
    "strands-agents>=1.26.0",
]
openai_agents = [
    "openai-agents>=0.1.0",
    "openai>=1.0.0",
]
all = [
    "diagrid[langgraph,crewai,adk,strands,openai_agents]",
]

[dependency-groups]
dev = [
    "mypy>=1.15.0,<2.0.0",
    "pip-tools>=7.4.1,<8.0.0",
    "cachetools>=6.1.0,<8.0.0",
    "flake8>=7.3.0",
    "ruff>=0.14.11",
    "pre-commit>=4.0.0,<5.0.0",
]
test = [
    "pytest>=7.0.0,<10.0.0",
    "pytest-cov>=4.0.0,<7.0.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.setuptools.packages.find]
where = ["."]
include = ["diagrid*"]
exclude = ["diagrid.agent.core*"]

[tool.setuptools.package-data]
diagrid = ["py.typed"]

[tool.uv.workspace]
members = [
    "diagrid/agent/core",
]

[tool.uv.sources]
diagrid-agent-core = { workspace = true }
