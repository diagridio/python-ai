apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: core-install
spec:
  description: Validate core catalyst-agents chart resources exist
  namespace: catalyst-agents
  timeouts:
    assert: 30m
    exec: 15m
  steps:
    # Wait for all key deployments to become ready
    - name: wait-for-readiness
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: gateway
                namespace: catalyst-agents
              status:
                (readyReplicas > `0`): true
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: catalyst-agents-grafana
                namespace: catalyst-agents
              status:
                (readyReplicas > `0`): true

    - name: check-secrets
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: llm-secret
                namespace: catalyst-agents

    - name: check-services
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: Service
              metadata:
                name: gateway
                namespace: catalyst-agents
              spec:
                type: NodePort

    - name: check-configmaps
      try:
        - assert:
            resource:
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: gateway-config
                namespace: catalyst-agents
